services:
  portfolio:
    build: .
    container_name: zen-portfolio
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production

  caddy:
    image: caddy:2-alpine
    container_name: zen-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
